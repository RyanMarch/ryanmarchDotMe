    <script>
        // Glimmering border effect - only on desktop
        if (window.matchMedia("(min-width: 951px)").matches) {
            let mouseX = 0;
            let mouseY = 0;

            const updateGlimmers = () => {
                document.querySelectorAll('.glimmer-card').forEach(card => {
                    const rect = card.getBoundingClientRect();
                    // The sticky positioning of ::before handles internal scroll automatically,
                    // so we just need the coordinates relative to the visible card frame.
                    card.style.setProperty('--mouse-x', `${mouseX - rect.left}px`);
                    card.style.setProperty('--mouse-y', `${mouseY - rect.top}px`);
                });
            };

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                updateGlimmers();
            });

            // Also update on scroll to keep the shimmer fixed to the mouse position 
            // even if the content scrolls underneath it.
            document.addEventListener('scroll', updateGlimmers, { capture: true, passive: true });
        }
    </script>
