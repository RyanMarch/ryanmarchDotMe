<!DOCTYPE html>

    <script>
        // Theme initialization
        (function () {
            const savedTheme = localStorage.getItem('theme');
            // If no theme is saved, default to 'dark' (as requested)
            // If theme is 'system', we leave data-theme unset to let CSS media queries take over
            const theme = savedTheme || 'dark';

            if (theme === 'system') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
            // document.documentElement.className = theme; // Redundant since we use [data-theme]
        })();

    </script>

    <script>
        // Slim header scroll trigger
        (function () {
            const slimHeader = document.getElementById('slim-header');
            const topRow = document.querySelector('.top-row');

            if (slimHeader && topRow) {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (!entry.isIntersecting) {
                            slimHeader.classList.add('visible');
                        } else {
                            slimHeader.classList.remove('visible');
                        }
                    },
                    { threshold: 0, rootMargin: '0px' }
                );
                observer.observe(topRow);
            }
        })();

        // Glimmering border effect - only on desktop
        if (window.matchMedia("(min-width: 951px)").matches) {
            let mouseX = 0;
            let mouseY = 0;

            const updateGlimmers = () => {
                document.querySelectorAll('.glimmer-card').forEach(card => {
                    const rect = card.getBoundingClientRect();
                    card.style.setProperty('--mouse-x', `${mouseX - rect.left}px`);
                    card.style.setProperty('--mouse-y', `${mouseY - rect.top}px`);
                });
            };

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                updateGlimmers();
            });

            document.addEventListener('scroll', updateGlimmers, { capture: true, passive: true });
        }
    </script>
