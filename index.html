        // Theme initialization
        (function() {
            const savedTheme = localStorage.getItem('theme');
            // If no theme is saved, default to 'dark' (as requested)
            // If theme is 'system', we leave data-theme unset to let CSS media queries take over
            const theme = savedTheme || 'dark'; 
            
            if (theme === 'system') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
            // document.documentElement.className = theme; // Redundant since we use [data-theme]
        })();

        const pathParts = window.location.pathname.split('/').filter(Boolean);
        if (pathParts.length > 0) {
            window.initialModalProject = pathParts[pathParts.length - 1];
        }
    </script>

    <script>
        // Theme Toggle Logic
        let themeStatusTimeout;
        const themeToggle = document.getElementById('theme-toggle');
        const themeStatus = document.getElementById('theme-status');

        const showThemeStatus = (text) => {
            themeStatus.textContent = text;
            themeStatus.classList.add('visible');
            clearTimeout(themeStatusTimeout);
            themeStatusTimeout = setTimeout(() => {
                themeStatus.classList.remove('visible');
            }, 2000);
        };

        themeToggle.addEventListener('click', () => {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            let newTheme;
            let statusText;
            
            // Cycle: Dark -> Light -> System -> Dark
            if (currentTheme === 'dark') {
                newTheme = 'light';
                statusText = 'Light Theme';
            } else if (currentTheme === 'light') {
                newTheme = 'system';
                statusText = 'System Theme';
            } else {
                newTheme = 'dark';
                statusText = 'Dark Theme';
            }
            
            if (newTheme === 'system') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', newTheme);
            }
            
            document.documentElement.className = newTheme;
            localStorage.setItem('theme', newTheme);
            showThemeStatus(statusText);
        });

        // Glimmering border effect - only on desktop
        if (window.matchMedia("(min-width: 951px)").matches) {
            let mouseX = 0;
            let mouseY = 0;

            const updateGlimmers = () => {
                document.querySelectorAll('.glimmer-card').forEach(card => {
                    const rect = card.getBoundingClientRect();
                    card.style.setProperty('--mouse-x', `${mouseX - rect.left}px`);
                    card.style.setProperty('--mouse-y', `${mouseY - rect.top}px`);
                });
            };

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                updateGlimmers();
            });

            document.addEventListener('scroll', updateGlimmers, { capture: true, passive: true });
        }
    </script>
