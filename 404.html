<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ryan March</title>
    <script type="text/javascript">
      // Robust SPA router hack
      console.log("404 Redirect Triggered for path: " + window.location.pathname);
      var l = window.location;
      var path = l.pathname + l.search + l.hash;
      var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?p=' + encodeURIComponent(path);
      console.log("Redirecting to: " + redirectUrl);
      l.replace(redirectUrl);
    </script>
  </head>
  <body>
  </body>
</html>
