<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ryan March</title>
    <script type="text/javascript">
      // Robust SPA router hack
      // Encodes the entire path and redirects to root
      var l = window.location;
      var path = l.pathname + l.search + l.hash;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?p=' + encodeURIComponent(path));
    </script>
  </head>

  </body>
</html>
